<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>NUFORC Dramatic and Unusual UAP Sightings Classifier logo</title>
  <desc>A circular radar/scanner graphic with a stylized saucer shape at center, surrounded by concentric rings and scan lines, with the app name and tagline</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="160" cy="160" r="130"/>
    </clipPath>
  </defs>

  <!-- Glow background -->
  <circle cx="160" cy="160" r="130" fill="url(#glow)"/>

  <!-- Concentric radar rings -->
  <circle cx="160" cy="160" r="120" fill="none" stroke="#1D9E75" stroke-width="0.5" opacity="0.4"/>
  <circle cx="160" cy="160" r="90"  fill="none" stroke="#1D9E75" stroke-width="0.5" opacity="0.45"/>
  <circle cx="160" cy="160" r="60"  fill="none" stroke="#1D9E75" stroke-width="0.5" opacity="0.5"/>
  <circle cx="160" cy="160" r="30"  fill="none" stroke="#1D9E75" stroke-width="0.5" opacity="0.5"/>

  <!-- Outer border ring -->
  <circle cx="160" cy="160" r="128" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.7"/>

  <!-- Crosshair lines -->
  <line x1="32" y1="160" x2="288" y2="160" stroke="#1D9E75" stroke-width="0.5" opacity="0.35"/>
  <line x1="160" y1="32"  x2="160" y2="288" stroke="#1D9E75" stroke-width="0.5" opacity="0.35"/>
  <line x1="69"  y1="69"  x2="251" y2="251" stroke="#1D9E75" stroke-width="0.5" opacity="0.2"/>
  <line x1="251" y1="69"  x2="69"  y2="251" stroke="#1D9E75" stroke-width="0.5" opacity="0.2"/>

  <!-- Sweep wedge (radar sweep) -->
  <path d="M160,160 L160,42 A118,118 0 0,1 265,214 Z" fill="#1D9E75" opacity="0.08"/>
  <line x1="160" y1="160" x2="265" y2="214" stroke="#1D9E75" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="160" x2="160" y2="42"  stroke="#1D9E75" stroke-width="1" opacity="0.5"/>

  <!-- UAP / saucer shape -->
  <ellipse cx="160" cy="162" rx="42" ry="11" fill="#0F6E56" stroke="#5DCAA5" stroke-width="1"/>
  <ellipse cx="160" cy="155" rx="18" ry="10" fill="#085041" stroke="#5DCAA5" stroke-width="0.8"/>
  <ellipse cx="160" cy="170" rx="28" ry="4" fill="#1D9E75" opacity="0.35"/>
  <circle cx="132" cy="162" r="2.2" fill="#9FE1CB"/>
  <circle cx="145" cy="165" r="2.2" fill="#5DCAA5"/>
  <circle cx="160" cy="167" r="2.2" fill="#9FE1CB"/>
  <circle cx="175" cy="165" r="2.2" fill="#5DCAA5"/>
  <circle cx="188" cy="162" r="2.2" fill="#9FE1CB"/>

  <!-- Blip dots on radar -->
  <circle cx="218" cy="112" r="3.5" fill="#5DCAA5" opacity="0.9"/>
  <circle cx="220" cy="111" r="1.5" fill="#E1F5EE"/>
  <circle cx="98"  cy="210" r="2.5" fill="#5DCAA5" opacity="0.6"/>
  <circle cx="192" cy="218" r="2"   fill="#5DCAA5" opacity="0.5"/>
  <circle cx="118" cy="100" r="1.8" fill="#9FE1CB" opacity="0.5"/>

  <!-- Tick marks on outer ring -->
  <g stroke="#1D9E75" stroke-width="1" opacity="0.5">
    <line x1="160" y1="32"  x2="160" y2="40"/>
    <line x1="160" y1="280" x2="160" y2="288"/>
    <line x1="32"  y1="160" x2="40"  y2="160"/>
    <line x1="280" y1="160" x2="288" y2="160"/>
    <line x1="68"  y1="68"  x2="74"  y2="74"/>
    <line x1="252" y1="68"  x2="246" y2="74"/>
    <line x1="68"  y1="252" x2="74"  y2="246"/>
    <line x1="252" y1="252" x2="246" y2="246"/>
  </g>

  <!-- Right side: text block -->
  <text x="330" y="105" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1D9E75" letter-spacing="3">NUFORC</text>
  <text x="330" y="140" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#5DCAA5" letter-spacing="5">UAP CLASSIFIER</text>

  <!-- Divider -->
  <line x1="330" y1="155" x2="630" y2="155" stroke="#1D9E75" stroke-width="0.5" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="330" y="178" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#085041">Dramatic &amp; Unusual Sightings</text>
  <text x="330" y="198" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#085041">Detection System</text>

  <!-- Tag line -->
  <text x="330" y="232" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#0F6E56" letter-spacing="1">Powered by CatBoost + NLP</text>

  <!-- Small classification badge -->
  <rect x="330" y="248" width="144" height="22" rx="4" fill="#085041" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="402" y="263" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="500" fill="#9FE1CB" letter-spacing="1.5">AUC 0.814  |  AP 0.421</text>
</svg>
